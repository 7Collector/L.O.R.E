name: Android Debug Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x freya/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Lint & Syntax Check
        working-directory: freya
        run: ./gradlew lintDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.daemon=false"

      - name: Build Debug APK
        working-directory: freya
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -Dorg.gradle.daemon=false"

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: freya-debug-${{ github.run_number }}
          path: freya/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
