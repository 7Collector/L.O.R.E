name: Backend Tests (Pytest)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          PYTHONPATH: .
          LOCAL_LLM: "False"
          API_KEY: "koala"
          JWT_SECRET: "test-secret-key-for-ci-32-bytes-long"
          JWT_ALGORITHM: "HS256"
          JWT_EXPIRY_HOURS: "168"
          SMTP_HOST: "mock"
          SMTP_PORT: "587"
          SMTP_USER: "mock"
          SMTP_PASSWORD: "mock"
          SMTP_FROM_EMAIL: "noreply@lore.local"
        run: |
          pytest --tb=short -v
